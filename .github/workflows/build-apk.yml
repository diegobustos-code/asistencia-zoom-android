name: Compilar APK de Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev automake build-essential libltdl-dev

      - name: Instalar Buildozer y python-for-android
        run: |
          python -m pip install --upgrade pip setuptools
          pip install buildozer==1.5.0 cython==0.29.33 python-for-android==2024.01.21

      - name: Compilar el APK con Buildozer
        run: |
          set -o pipefail
          python -m buildozer -v android debug 2>&1 | tee buildozer-log.txt

      - name: Publicar el APK y el log como archivos descargables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaZoom-APK
          path: |
            bin/*.apk
            buildozer-log.txt