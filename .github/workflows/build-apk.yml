name: Compilar APK de Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev automake build-essential libltdl-dev

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Limpiar caché de buildozer
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.cache/pip

      - name: Instalar Buildozer y dependencias
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.33
          pip install buildozer==1.5.0
          pip install python-for-android==2024.1.21
          pip install kivy==2.2.1

      - name: Generar archivos de configuración de Kivy para Cython
        run: |
          python -c "import kivy; from kivy.cython import install; install()" || true
          # Alternativa: copiar config.pxi desde el directorio de Kivy instalado
          python << 'EOF'
          import os
          import shutil
          from pathlib import Path
          
          # Encontrar la ruta de instalación de Kivy
          import kivy
          kivy_path = Path(kivy.__file__).parent
          
          # Crear directorio de caché de p4a si no existe
          p4a_cache = Path.home() / ".buildozer" / "cache" / "p4a"
          p4a_cache.mkdir(parents=True, exist_ok=True)
          
          # Copiar los archivos .pxi si existen
          config_pxi = kivy_path / "core" / "config.pxi"
          if config_pxi.exists():
              shutil.copy(config_pxi, p4a_cache / "config.pxi")
              print(f"Copiado {config_pxi} a {p4a_cache}")
          EOF

      - name: Compilar el APK con Buildozer
        run: |
          yes | buildozer -v android debug

      - name: Publicar el APK como archivo descargable
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaZoom-APK
          path: bin/*.apk
