name: Compilar APK de Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/kivy:latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias adicionales
        run: |
          apt-get update
          apt-get install -y git zip unzip

      - name: Instalar Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Compilar el APK con Buildozer
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer-log.txt

      - name: Publicar el APK y el log como archivos descargables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaZoom-APK
          path: |
            bin/*.apk
            buildozer-log.txt