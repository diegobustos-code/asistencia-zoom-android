name: Compilar APK de Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev cmake libffi-dev libssl-dev automake build-essential libltdl-dev

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Buildozer y herramientas Python necesarias
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33 python-for-android==2024.1.21

      - name: Instalar dependencias del proyecto
        run: |
          pip install -r requirements.txt

      - name: Verificar dependencias instaladas
        run: |
          pip freeze

      - name: Guardar en caché el SDK/NDK de Android
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-v2-${{ hashFiles('buildozer.spec') }}

      - name: Comprobar espacio y Java
        run: |
          df -h .
          java -version
          free -m

      - name: Compilar el APK con Buildozer (descarga SDK/NDK durante build)
        run: |
          yes | python -m buildozer -v android debug | tee buildozer-log.txt

      - name: Publicar el APK como archivo descargable
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaZoom-APK
          path: bin/*.apk

      - name: Publicar log de compilación
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer-log.txt
