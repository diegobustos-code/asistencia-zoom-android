name: Compilar EXE de Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    # A diferencia del APK (que se compila en una máquina Linux con
    # Buildozer), un .exe de Windows solo se puede compilar en una
    # máquina Windows de verdad — por eso este job corre en
    # "windows-latest" en vez de "ubuntu-22.04".
    runs-on: windows-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias (openpyxl, Pillow, PyInstaller)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Compilar el .exe con PyInstaller
        run: pyinstaller --noconfirm --onefile --windowed --name "AsistenciaZoom" --icon "logo.ico" --add-data "logo.png;." --add-data "logo.ico;." desktop_app.py

      - name: Publicar el .exe como archivo descargable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AsistenciaZoom-EXE
          path: |
            dist/AsistenciaZoom.exe
            build/AsistenciaZoom/warn-AsistenciaZoom.txt
